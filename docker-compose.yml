services:
  sql:
    container_name: payments-service-sql
    image: mcr.microsoft.com/azure-sql-edge
    restart: always
    cap_add:
      - SYS_PTRACE
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=1
    env_file: compose.env
    networks:
      - sb-emulator

  servicebus-emulator:
    container_name: payments-service-servicebus-emulator
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    pull_policy: always
    volumes:
      - "./docker-compose-servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json"
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: sql
      ACCEPT_EULA: "Y"
    env_file: compose.env
    depends_on:
      - sql
    networks:
      - sb-emulator

networks:
  sb-emulator:
